<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Your Cart – Ayini Home Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-top">
    <a href="index.html" class="logo">
      <img src="https://raw.githubusercontent.com/Sanjay123ps/ayini-website/main/AYINI.png" alt="Ayini Logo">
      <div class="logo-text"><strong>Ayini Home <span style="color:var(--amber)">Products</span></strong></div>
    </a>
    <nav class="header-actions">
      <a href="login.html" id="loginLink">Login / Register</a>
      <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1>🛒 Your Cart</h1>
    <p>Review your items before checkout</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="cart-layout">
      <!-- Items -->
      <div>
        <div class="form-card" style="padding:0;overflow:hidden;">
          <div style="padding:20px 24px;border-bottom:1px solid var(--gray-100);font-weight:600;color:var(--green-dark);">
            Cart Items
          </div>
          <div id="cartItems"><div style="padding:48px;text-align:center;"><div class="spinner"></div><p>Loading…</p></div></div>
          <div style="padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;gap:10px;">
            <input type="text" id="couponInput" placeholder="COUPON CODE" style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:.9rem;text-transform:uppercase;">
            <button class="btn btn-primary" onclick="applyCoupon()">Apply</button>
          </div>
          <p id="couponMsg" style="padding:0 24px 12px;font-size:.82rem;"></p>
        </div>
      </div>
      <!-- Summary -->
      <div>
        <div class="summary-card">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
          <div class="summary-row"><span>Shipping</span><span id="sumShipping">₹50</span></div>
          <div class="summary-row discount" id="discRow" style="display:none"><span>Discount</span><span id="sumDiscount">-₹0</span></div>
          <div class="summary-row total"><span>Total</span><span id="sumTotal">₹0</span></div>
          <div class="free-ship" id="freeShipMsg">🛵 Add ₹<span id="freeRemain">500</span> more for FREE shipping!</div>
          <button class="btn btn-primary btn-full" id="checkoutBtn" onclick="window.location.href='checkout.html'" disabled style="margin-top:12px;">
            Proceed to Checkout →
          </button>
          <a href="index.html" style="display:block;text-align:center;margin-top:12px;font-size:.9rem;color:var(--green);">← Continue Shopping</a>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="js/api.js"></script>
<script>
let cartData = null, discount = 0, couponCode = '';

async function loadCart() {
  if (!Auth.isLoggedIn()) {
    document.getElementById('cartItems').innerHTML = `<div class="empty-state"><div class="icon">🔐</div><h3>Please login to view your cart</h3><a href="login.html" class="btn btn-primary" style="margin-top:12px;">Login</a></div>`;
    return;
  }
  try {
    cartData = await CartAPI.get();
    renderCart();
  } catch(e) { document.getElementById('cartItems').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`; }
}

function renderCart() {
  if (!cartData.items.length) {
    document.getElementById('cartItems').innerHTML = `<div class="empty-state"><div class="icon">🛒</div><h3>Your cart is empty</h3><a href="index.html" class="btn btn-primary" style="margin-top:12px;">Shop Now</a></div>`;
    document.getElementById('checkoutBtn').disabled = true;
    updateSummary(0,0,0); return;
  }
  document.getElementById('cartItems').innerHTML = cartData.items.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">🌿</div>
      <div class="cart-item-info">
        <h4>${item.name}</h4>
        <p class="price">₹${item.price} / ${item.unit||'piece'}</p>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${item.product_id},${item.quantity-1})">−</button>
          <span class="qty-num">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${item.product_id},${item.quantity+1})">+</button>
        </div>
      </div>
      <span class="cart-subtotal">₹${(item.price*item.quantity).toFixed(0)}</span>
      <button class="remove-btn" onclick="removeItem(${item.product_id})">🗑️</button>
    </div>`).join('');
  document.getElementById('checkoutBtn').disabled = false;
  updateSummary(cartData.subtotal, cartData.shipping, discount);
}

function updateSummary(sub, ship, disc) {
  document.getElementById('sumSubtotal').textContent = '₹' + sub.toFixed(0);
  document.getElementById('sumShipping').textContent = ship === 0 ? 'FREE 🎉' : '₹' + ship;
  document.getElementById('sumTotal').textContent = '₹' + (sub + ship - disc).toFixed(0);
  if (disc > 0) { document.getElementById('discRow').style.display='flex'; document.getElementById('sumDiscount').textContent='-₹'+disc; }
  const remain = Math.max(0, 500-sub);
  const msg = document.getElementById('freeShipMsg');
  if (remain === 0) { msg.textContent = '🎉 You have FREE shipping!'; }
  else { msg.innerHTML = `🛵 Add ₹<span>${remain.toFixed(0)}</span> more for FREE shipping!`; }
}

async function changeQty(pid, qty) {
  if (qty < 1) { removeItem(pid); return; }
  try { cartData = await CartAPI.add(pid, qty); renderCart(); updateCartBadge(); } catch(e) { showToast(e.message, true); }
}
async function removeItem(pid) {
  try { cartData = await CartAPI.remove(pid); renderCart(); updateCartBadge(); } catch(e) { showToast(e.message, true); }
}
async function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim();
  const msg = document.getElementById('couponMsg');
  if (!code) return;
  try {
    const r = await CartAPI.coupon(code);
    discount = r.discount; couponCode = code;
    msg.style.color = 'var(--green)'; msg.textContent = '✅ ' + r.message;
    updateSummary(cartData.subtotal, cartData.shipping, discount);
  } catch(e) { msg.style.color = '#dc2626'; msg.textContent = '❌ ' + e.message; }
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
</body></html>
